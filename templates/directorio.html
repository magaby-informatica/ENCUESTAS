{% extends "base.html" %}
{% block title %}Directorio I.E.{% endblock %}
{% block content %}
<h1>Directorio Instituciones Educativas</h1>
<form method="post">
    <label>Nueva institución educativa</label>
    <input type="text" name="institucion" required>
    <button type="submit">Agregar</button>
</form>
<table>
<tr><th>Item</th><th>Institución Educativa</th><th></th></tr>
{% for r in registros %}
<tr>
    <td>{{ r.ITEM }}</td>
    <td>{{ r.INSTITUCION_EDUCATIVA }}</td>
    <td><a class="btn" href="{{ url_for('directorio_eliminar', item=r.ITEM) }}">Eliminar</a></td>
</tr>
{% endfor %}
</table>
{% endblock %}
